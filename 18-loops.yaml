- name: install packages using loop
  hosts: frontend
  become: yes
  tasks:
    - name: install packages
      package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
      - { name: "nginx", state: present }
      - { name: "mysql", state: absent }
      - { name: "zip", state: present }
      - { name: "git", state: absent }  