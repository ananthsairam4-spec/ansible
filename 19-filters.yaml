- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: "Linux, Shell, Ansible, Terraform, AWS"
    tagMap:
      name: Ansible
      project:  Roboshop
      environment: Development
    full_name: Anantha Sairam G
    ip_address: 192.168.10.300
    tagslist: [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "Roboshop"
        },
        {
            "key": "environment",
            "value": "Development"
        }
    ]

  tasks: 
  - name: convert string to list
    debug:
      msg: "Topics are: {{ topics.split(',') }}"

  - name: set default value
    debug:
      msg: "Hi {{ Greeting | default('Good Morning') }}"

  - name: convert map to list
    debug:
      msg: "{{ tagMap | dict2items }}"
    
  - name: convert list to map
    debug:
      msg: "{{ tagslist | items2dict }}"
  
  - name: convert to upper case
    debug:
      msg: "{{ full_name | upper }}"
    
  - name: convert to lower case
    debug:
      msg: "{{ full_name | lower }}"

  - name: check ipv4 address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4 }}"


  